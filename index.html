<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Racial Equity Plan 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14;--surface:#141820;--surface2:#1c2230;--surface3:#222a3a;
  --border:rgba(255,255,255,0.08);--text:#e8eaf0;--muted:rgba(232,234,240,0.45);
  --dim:rgba(232,234,240,0.22);--rust:#e05c3a;--teal:#2ab8a0;--gold:#f0b429;
  --short-c:#2ab8a0;--medium-c:#f0b429;--long-c:#9b6dff;
  --live-c:#34d399;--hold-c:#f59e0b;--none-c:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
#app{display:grid;grid-template-columns:260px 1fr;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-logo{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:var(--rust);margin-bottom:2px;}
.sidebar-subtitle{font-size:10.5px;color:var(--dim);}
#search-wrap{padding:9px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-size:11.5px;font-family:'Inter',sans-serif;outline:none;}
#search::placeholder{color:var(--dim);}
#search:focus{border-color:rgba(255,255,255,0.18);}
#area-tabs{display:flex;flex-direction:column;gap:1px;padding:5px 7px;border-bottom:1px solid var(--border);flex-shrink:0;}
.area-tab{padding:5px 8px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;text-align:left;display:flex;align-items:center;justify-content:space-between;width:100%;}
.area-tab:hover{background:var(--surface2);color:var(--text);}
.area-tab.active{background:rgba(224,92,58,0.16);color:var(--rust);}
#agency-list{flex:1;overflow-y:auto;padding:5px;}
#agency-list::-webkit-scrollbar{width:3px;}
#agency-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.agency-btn{display:flex;width:100%;text-align:left;padding:7px 8px;border-radius:4px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:11px;font-family:'Inter',sans-serif;transition:all 0.15s;align-items:flex-start;gap:6px;}
.agency-btn:hover{background:var(--surface2);color:var(--text);}
.agency-btn.active{background:rgba(224,92,58,0.13);color:var(--text);}
.agency-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.agency-btn-name{flex:1;line-height:1.35;}
.agency-eq-badge{flex-shrink:0;font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;margin-top:1px;}
.eq-has{background:rgba(52,211,153,0.15);color:#34d399;}
.eq-partial{background:rgba(245,158,11,0.15);color:#f59e0b;}
.eq-none{background:rgba(107,114,128,0.12);color:#6b7280;}

/* TOPBAR */
#main{overflow:hidden;display:flex;flex-direction:column;}
#topbar{padding:0 24px;height:50px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface);gap:12px;}
#home-btn{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;border-radius:4px;padding:5px 11px;font-size:11px;font-family:'Inter',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:5px;flex-shrink:0;}
#home-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.topbar-center{display:flex;align-items:center;flex:1;min-width:0;gap:8px;overflow:hidden;}
#agency-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px;}
#agency-area-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
#nav-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
#nav-btns button{background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;border-radius:4px;padding:4px 11px;font-size:11px;font-family:'Inter',sans-serif;transition:all 0.15s;}
#nav-btns button:hover{color:var(--text);border-color:rgba(255,255,255,0.18);}
#agency-counter{font-size:10.5px;color:var(--dim);min-width:44px;text-align:center;}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:22px 26px 48px;}
#content::-webkit-scrollbar{width:4px;}
#content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

/* EQ BANNER */
.eq-banner{border-radius:8px;padding:14px 18px;margin-bottom:20px;border:1px solid;display:flex;gap:14px;align-items:flex-start;}
.eq-banner.has-live{background:rgba(52,211,153,0.06);border-color:rgba(52,211,153,0.25);}
.eq-banner.has-hold{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2);}
.eq-banner.no-eq{background:rgba(107,114,128,0.05);border-color:rgba(107,114,128,0.15);}
.eq-banner-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.eq-banner-title{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;}
.has-live .eq-banner-title{color:#34d399;}
.has-hold .eq-banner-title{color:#f59e0b;}
.no-eq .eq-banner-title{color:#6b7280;}
.eq-indicator-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.eq-chip{font-size:10.5px;padding:3px 9px;border-radius:4px;display:flex;align-items:center;gap:4px;text-decoration:none;transition:opacity 0.15s;}
.eq-chip:hover{opacity:0.8;}
.eq-chip.live{background:rgba(52,211,153,0.12);color:#34d399;border:1px solid rgba(52,211,153,0.2);}
.eq-chip.hold{background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.18);}
.eq-chip.no-status{background:rgba(107,114,128,0.1);color:#9ca3af;border:1px solid rgba(107,114,128,0.15);}
.eq-chip-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;}
.eq-chip-type{font-size:9px;opacity:0.55;margin-left:2px;}

/* TERM SECTIONS */
.term-section{margin-bottom:26px;}
.term-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.term-pill{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:3px 8px;border-radius:20px;}
.term-pill.short{background:rgba(42,184,160,0.15);color:var(--short-c);}
.term-pill.medium{background:rgba(240,180,41,0.15);color:var(--medium-c);}
.term-pill.long{background:rgba(155,109,255,0.15);color:var(--long-c);}
.term-label{font-size:12px;color:var(--muted);}
.term-count{font-size:10px;color:var(--dim);margin-left:auto;}

/* GOAL CARDS */
.goals-grid{display:flex;flex-direction:column;gap:10px;}
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:border-color 0.2s;}
.goal-card:hover{border-color:rgba(255,255,255,0.14);}
.goal-card-header{padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;}
.goal-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;flex-shrink:0;margin-top:1px;}
.goal-num.short{background:rgba(42,184,160,0.2);color:var(--short-c);}
.goal-num.medium{background:rgba(240,180,41,0.2);color:var(--medium-c);}
.goal-num.long{background:rgba(155,109,255,0.2);color:var(--long-c);}
.goal-title{font-size:12.5px;font-weight:500;line-height:1.45;flex:1;}
.goal-chevron{font-size:9px;color:var(--dim);flex-shrink:0;margin-top:4px;transition:transform 0.2s;}
.goal-card.open .goal-chevron{transform:rotate(180deg);}
.goal-body{display:none;padding:0 14px 13px 44px;border-top:1px solid var(--border);padding-top:12px;}
.goal-card.open .goal-body{display:block;}
.goal-section-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;margin-top:10px;}
.goal-section-label:first-child{margin-top:0;}
.outcome-text{font-size:12px;line-height:1.6;color:var(--text);background:var(--surface2);border-radius:4px;padding:8px 10px;border-left:2px solid var(--teal);font-weight:300;}
.strat-list,.ind-list{display:flex;flex-direction:column;gap:4px;}
.strat-item,.ind-item{font-size:11.5px;line-height:1.5;color:var(--muted);padding:4px 8px;border-radius:4px;background:var(--surface2);display:flex;gap:6px;font-weight:300;}
.strat-item::before{content:'→';color:var(--teal);flex-shrink:0;font-size:10px;margin-top:1px;}
.ind-item::before{content:'◎';color:var(--gold);flex-shrink:0;font-size:9px;margin-top:2px;}

/* OVERVIEW */
.ov-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.02em;margin-bottom:5px;}
.ov-sub{font-size:12.5px;color:var(--muted);line-height:1.6;max-width:520px;font-weight:300;margin-bottom:24px;}
.ov-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:border-color 0.2s;position:relative;}
.stat-box:hover{border-color:rgba(255,255,255,0.2);}
.stat-box.clickable::after{content:'↗';position:absolute;top:10px;right:12px;font-size:10px;color:var(--dim);}
.stat-num{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-0.03em;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--muted);}

/* STAT POPOVER */
.stat-popover{position:fixed;z-index:200;background:var(--surface2);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:16px;min-width:240px;max-width:320px;max-height:400px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.stat-popover::-webkit-scrollbar{width:3px;}
.stat-popover::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);}
.stat-popover-title{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.stat-popover-item{font-size:12px;color:var(--text);padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px;transition:color 0.15s;}
.stat-popover-item:last-child{border-bottom:none;}
.stat-popover-item:hover{color:var(--rust);}
.stat-popover-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* EQ COVERAGE */
.eq-coverage-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:20px;}
.eq-cs-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.eq-cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.eq-cs-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px;border-radius:5px;transition:background 0.15s;}
.eq-cs-item:hover{background:var(--surface2);}
.eq-cs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.eq-cs-count{font-size:18px;font-weight:700;font-family:'Syne',sans-serif;}
.eq-cs-label{font-size:11px;color:var(--muted);}

.area-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.area-overview-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:15px;cursor:pointer;transition:all 0.15s;display:flex;align-items:flex-start;gap:11px;}
.area-overview-card:hover{border-color:rgba(255,255,255,0.18);background:var(--surface2);}
.area-dot-big{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.area-card-name{font-size:12.5px;font-weight:600;margin-bottom:3px;}
.area-card-meta{font-size:10.5px;color:var(--dim);}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;z-index:100;background:transparent;}
#overlay.active{display:block;}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="sidebar-logo">EquityNYC</div>
      <div class="sidebar-subtitle">REP 2026 · 45 Agencies · EquityNYC Coverage</div>
    </div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search agencies…" oninput="filterAgencies(this.value)">
    </div>
    <div id="area-tabs"></div>
    <div id="agency-list"></div>
  </div>
  <div id="main">
    <div id="topbar">
      <button id="home-btn" onclick="showOverview()">⌂ Home</button>
      <div class="topbar-center">
        <span id="agency-title">Overview</span>
        <span id="agency-area-badge"></span>
      </div>
      <div id="nav-btns">
        <button onclick="navAgency(-1)">← Prev</button>
        <span id="agency-counter"></span>
        <button onclick="navAgency(1)">Next →</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="overlay" onclick="closePopover()"></div>

 distribution", "Increase internal capacity (number of Operations Analysts) to lower caseloads to improve response times and technical assistance"], "indicators": ["• Percent of providers submitting invoices within required timeline", "Percent of providers receiving monthly payments"]}, {"goal": "Build a workforce that emphasizes culturally responsive and sustaining instruction and recognizes and addresses the role of implicit bias. We recognize that implicit bias training should not be treated as a one-off workshop or isolated professional development requirement. Instead, it is positioned ", "outcome": "By 2027, increase the number of teachers who receive professional learning in implicit bias and culturally relevant pedagogy", "strategies": ["• Reinvest in hiring a team of skilled trainers to staff an Access and Equity Team to develop and facilitate a multi-part professional learning series on implicit bias", "Invest in training Department of Early Childhood Education assigned leadership coaches and social workers to support these efforts at the individual program level and effectively provide strength-based feedback", "Develop support and training in schools to implement culturally responsive and sustaining materials"], "indicators": ["• Percent of leadership coaches and social workers who have completed a multi-part professional learning series on implicit bias", "Percent of early childhood program leaders who have completed a multi-part professional learning series on implicit bias", "Percent of program leaders who have participated in a pilot program to facilitate this content with their larger team and provide feedback", "Percent of schools using Hidden Voices and Black Studies curriculum"]}, {"goal": "Address the disproportionate placement of Black boys with disabilities in District 75 schools during the kindergarten Individualized Education Program (IEP) process", "outcome": "Reduce the percentage of Black boys with disabilities placed in District 75 schools as they enter kindergarten.", "strategies": ["• Enhance district-level monitoring and accountability structures to track referral and placement data, allowing for ongoing assessment and adjustment of practices with a particular focus on the kindergarten IEP process", "Deepen training for educators in implicit bias and culturally competent assessment practices to ensure fair referral processes and culturally responsive behavioral supports", "Engage families and communities in the referral process to ensure transparency and cultural relevance", "Devote more resources toward the multi-tiered system of supports (MTSS) while ensuring that all classrooms are universally designed"], "indicators": ["• Percent of Black boys in NYCPS referred to special education", "Percent of Black boys with disabilities placed in District 75 schools", "Percent of Black boys in NYCPS receiving support services within general education settings in their home-zoned schools"]}], "medium": [{"goal": "Integrate a commitment to holistic child development, responsive caregiving, and supportive high-quality environments in all NYCPS’ education settings to support the social and emotional development of students and reduce inappropriate disciplinary measures that disproportionately impact students of", "outcome": "By 2028, increase schools that have access to training and materials to implement culturally responsive classrooms and support students’ social-emotional growth, including culturally responsive curriculum, restorative practices, and more.", "strategies": ["• Offer Pyramid Model training for early childhood program leaders and staff across all NYCPS early care and education settings", "Provide additional support to early childhood program staff, such as practice-based coaching, with an emphasis on equity and culturally sustaining practices to ensure successful implementation", "Use Pyramid Model tools (TPOT and TPITOS) to assess implementation of Pyramid Model practices and social-emotion ict schools", "Expand specialized programs to include seats in every district"], "indicators": ["• Demographics of students by race and gender attending District 75 schools outside their local communities", "Percentages of students by race and gender originally in District 75 schools who are now enrolled in local schools offering inclusive education", "Number of new specialized programs that provide high quality and intensive inclusive opportunities"]}, {"goal": "Disrupt historical inequities in college and career success by ensuring that all students graduate with a pathway to a rewarding career and long-term economic security", "outcome": "By 2030, ensure that 100 percent of NYC Public School graduates have foundational skills for career readiness, computer science, and financial literacy, as well as a plan to gain early college credits and/or career credentials.", "strategies": ["• Scale access to computer science through integration with NYC Reads, FutureReadyNYC, and NYC Solves", "Scale FutureReadyNYC to increase access to early college credits, Pathways-aligned advising, financial literacy, and career-readiness courses", "Increase the number of apprenticeships and internships available through FutureReadyNYC, Career Readiness, and Modern Youth Apprenticeships"], "indicators": ["• Percent of high schoolers with paid work-based learning experience such as internships or apprenticeships in a high-growth, high opportunity field", "Percent of students who have received 1:1 advising across grades 9-12, including Individualized Progress Reviews", "Percent of students completing courses in financial literacy, career readiness, and digital fluency skills", "Percent of students with access to early college credit opportunities", "Percent of students enrolled in market-aligned pathways"]}, {"goal": "Refine financial management systems and operational infrastructure that house M/WBE information to allow employees to more efficiently work with M/WBE vendors while continuin ce groups", "Number of employees participating in employee resource groups"]}, {"goal": "Prioritize access to care to advance health equity for all patients", "outcome": "By 2028, increase the number of uninsured New Yorkers connected to affordable, high-quality primary, preventive, and specialty care, regardless of their ability to pay.", "strategies": ["• Partner with community-based organizations, houses of worship, and anchor institutions operating in Taskforce on Racial Inclusion & Equity (TRIE) zip codes", "Partner with elected officials and relevant city agencies to reach the hardest to reach zip codes", "Reach every TRIE zip code"], "indicators": ["• Number of outreach encounters in each TRIE zip code"]}], "long": [{"goal": "Increase access to care", "outcome": "By 2034, every New Yorker has a primary care physician.", "strategies": ["• Complete at least 100,000 outreach encounters per year", "Maintain persistent multi-lingual public awareness campaign regarding NYC Care and the right to health care", "Reach underserved communities, based on agency disparity analysis", "Improve data pipelines across the System to accurately capture patients' data.", "Embed usage of automated Systems to monitor clinical outcomes according to race, ethnicity and language to improve clinical outcomes"], "indicators": ["• Number of encounters per year"]}, {"goal": "Advance comprehensive training programs and specialized services to meet the unique health needs of LGBTQ+ individuals", "outcome": "By 2034, 100% of the five boroughs will have Pride Health services.", "strategies": ["• Improve data pipelines across the System to accurately capture patients' identities including their Sexual Orientation Gender Identity (SOGI) in electronic health records, and monitor annually", "Collaborate with partners and vendors to design a SOGI data collection training program and a clear communications strategy for staff to complete training", "Expand Pride Health services to more facilities ac ups in all OCME units for solely informational and communications purposes"], "indicators": ["• Percent of OCME units with access to disaggregated employee and hiring data"]}], "medium": [{"goal": "Build an inclusive workplace to strengthen employee retention and career advancement, with a particular focus on employees of underrepresented backgrounds", "outcome": "By 2028, establish at least one employee resource group (ERG) where racial equity is addressed in areas such as mental/physical well-being, education, job training, and job advancement.", "strategies": ["• Demonstrate how addressing racial equity fosters understanding and tolerance to reduce workplace aggression and EEO-related issues", "Establish EEO Focus Groups, Affinity Groups, and Employee Resource Groups (ERGs) to foster employee participation in creating support systems and tangible improvements in their work and life environments", "Review the resulting data from Focus Groups, Affinity Groups, and ERGs, as well as Wellness activities to evaluate the impact of these efforts and help determine the most valuable next steps", "Examine the success of retention efforts so that our office can address potential racial disparities in our staffing practices"], "indicators": ["• Employee retention rate, by race/ethnicity", "Number of employees participating in ERGs, by race/ethnicity"]}, {"goal": "Address any underrepresentation of staff in certain roles within the agency through equitable hiring and recruitment practices for all vacancies", "outcome": "By 2028, implement inclusive workforce practices that attract diverse applicants.", "strategies": ["• Update website language to reflect our diverse workforce to attract talent", "Expand agency participation in internships, career fairs, and outreach programs with schools to build diverse recruitment pipelines", "Develop a pilot program to partner with one or more schools or outreach where the approach could be evaluated as to a successful plan", "Additionally, OCME will ensure all job descriptions utilize inclusive language and focus on essential skills and qualifications", "OCME Human Resources will put a focus on ensuring programs continue to use diverse interview panels and ensure interview questions are inclusive and geared to skills needed for the position"], "indicators": ["• Number of recruiting events attended", "Demographic composition of applicants22", "Demographic composition of staff This information is used for informational or communications purposes, only."]}], "long": [{"goal": "OCME has had a 30% goal for M/WBE utilization and will continue to implement and evaluate goals going forward to ensure they are consistent with federal, state, and local law", "outcome": "By 2034, maintain consistent implementation and assessment for M/WBE utilization.", "strategies": ["• Partner with independent M/WBE contractors to fill various roles within the overall scope of OCME needs. This may be in the areas of security contracting, facilities, technician support, and administrative needs.", "Release RFIs to diverse populations that are historically underutilized as vendors", "Actively participate in Procurement and M/WBE events to promote our needed commodities"], "indicators": ["• Percent of agency contracts awarded to M/WBEs"]}, {"goal": "Establish internal and external programs with universities and high schools to highlight the options in a career in forensic science", "outcome": "By 2034, establish partnerships with at least one university and one high school, leveraging the life sciences corridor to be expanded in Kips Bay with the construction of the new Manhattan Forensic Pathology Center in the forthcoming SPARC Kips Bay facility.", "strategies": ["• In 2024, OCME’s Forensics Week showcased the variety of work OCME does. This will be taken to schools physically and virtually to show what options exist throughout the agency", "OCME will host classes in traditionally minority-based schools in forensic science and pre-med Forensic Medicine"], "indicators": ["• Number of partnerships established with academic institutions"]}, {"goal": "Continue to invest resources in and expand existing innovative OCME programs that reduce racial disparities, such as the innovative Drug Intelligence and Intervention Group (DIIG) program", "outcome": "By 2034, strive to expand the DIIG concept to at least one area in addition to drug fatalities.", "strategies": ["• Use efforts such as the DIIG to gain insight about where more targeted support with post-tragedy/ fatality costs, psychological/ emotional trauma, education, housing, and medical concerns is needed", "Partner with city agencies, nonprofits, and community-based organizations to provide services in those areas"], "indicators": ["• Number of families reached", "Number of families that are connected to services Draft Community Equity Priorities Referenced", "#1: Close the racial, gender identity, age, and disability gaps in city government positions that create or decide over city policy with individuals who are committed to equity, and social justice. #1"]}], "eq_abbrevs": [], "eq_live": [], "eq_hold": [], "eq_retired": [], "eq_no_status": []}, {"name": "Department of Correction", "area": "Community Safety, Rights & Accountability", "short": [{"goal": "Prevent excessive or inappropriate uses of force and support deescalation of conflict so that force does not become necessary", "outcome": "By the end of 2026, ensure all DOC uniformed members of service have completed newly developed training courses related to conflict resolution and appropriate use of force. Professional development for staff in core correctional practices will support the goal of ensuring DOC jails are safe and humane for staff and people in custody (PIC), which will reduce harm for these marginalized communities.", "strategies": ["• Revise and implement training courses for staff that are effective in preventing excessive or inappropriate uses of force and supporting de-escalation of conflict so that force does not become necessary, and the jails are safer for all."], "indicators": ["• Percent of uniformed members of service who have completed newly developed training courses related to conflict resolution and appropriate use of force"]}, {"goal": "Ensure staff and those in custody remain safe from violence and resulting injury so that no one is further marginalized and can ultimately thrive", "outcome": "By the end of 2026, continue to work to achieve an overall reduction in violence in the jails, including violent incidents among people in custody and assaults on staff by persons in custody.", "strategies": ["• Prioritize the hiring and retention of staff and expand partnerships with government and nonprofit agencies to offer increased levels of service delivery and programming, thus reducing idle time and supporting the conditions necessary for treatment, rehabilitation, and effective reentry into socie", "Continue to review the dashboard provided by DCAS to determine which titles experience underutilization", "Conduct targeted recruitment for both uniform and non-uniform titles by attending career fairs and cultural events throughout New York State and utilizing insight data to inform future recruitment efforts", "Develop a new survey to gauge employee satisfaction with the Department as an employer and gain perspectives on different aspects affecting employee decisions to remain at the Department, like HR policies, pay and perks, work-life balance, and relationship with peers", "Track and evaluate violent incident rates disaggregated by race to identify any disparities and root causes"], "indicators": ["• Number and percent of violent incidents disaggregated by race", "Recruitment and retention rates disaggregated by race"]}], "medium": [{"goal": "Invest in and expand jail-based programs and services to bolster therapeutic outcomes, support impacted individuals and communities in recovering from harm, and create a safer a ics of program and service enrollment"]}, {"goal": "Build and improve robust data pipelines that can be disaggregated by various demographics, such as race, age, and gender to identify disparities in service provision", "outcome": "By 2028, leverage 100% of newly created data systems to better disaggregate data Department-wide and within each system, and to better support historical data tracking that can be used to analyze and respond to trends in disparities.", "strategies": ["• Revamp incident reporting data flows and revise incident reporting policies", "Transition from paper-based logbooks to a digital logbook system to track compliance with minimum standards and other regulatory requirements more efficiently", "Improve incident reporting and tracking across the Department to support better data analysis, including disaggregation of certain indicators"], "indicators": ["• Number of applications developed that replace paper-based tracking processes and/or create new data tracking systems"]}, {"goal": "Assess and evaluate implementation of accommodations and programs/program changes to continue to enhance safety, dignity, and care for TGNCNBI population, and reduce instances of violence", "outcome": "By 2028, track and report accommodations provided as well as programs implemented or refined to support this population.", "strategies": ["• Utilizing the agency’s new advanced tracker for programming that can be analyzed by person in custody (PIC), housing area, facility, etc., review trends to analyze program participation and determine appropriate changes", "Continue to hold DOC LGBTQ+ Affairs-coordinated weekly and monthly meetings in the Special Considerations Unit (SCU), along with other program houses in facilities that house TGNCNBI people in custody, gather feedback on the most requested programs, and discuss with DPCP leadership to determine new ", "Implement collaboration between DOC LGBTQ+ Affairs and DOC’s Office of Constituent and Grievance Services (OCGS) to identify trends within TGNCNBI people in custody’s grievances and implement identified solutions", "Continue to expand DOC partnerships to provide re-entry services specific to the LGBTQ+ community, building on existing partnerships, like the agency’s collaboration with Destination Tomorrow to deliver consistent re-entry programs to TGNCNBI people in custody"], "indicators": ["• Instances of violence experienced by the population", "Programs implemented and/or refined", "Number of accommodations provided", "Number of sessions held with LGBTQ+ Coordinators"]}], "long": [{"goal": "DOC has had 30% goal for M/WBE utilization and will continue to implement and evaluate goals going forward to ensure they are consistent with federal, state, and local law.", "outcome": "By 2034, maintain consistent implementation and assessment for M/WBE utilization.", "strategies": ["• Continue to host M/WBE Vendor Networking Events to have businesses (either currently registered or seeking to register as M/WBE vendors) learn more about doing business with the City of New York"], "indicators": ["• Number of contracts awarded to M/WBEs", "Number of participants and attendance rates at M/WBE vendor events"]}, {"goal": "Prioritize agency resources to focus on personal growth, wellness, and community-connections for incarcerated individuals and staff", "outcome": "By 2034, operationalization of all borough-based jail facilities will strengthen connections to families, attorneys, courts, medical and mental health care, and faith and community-based organizations. Being closer to home and transit will enhance the network of support systems for people who are detained and help prevent future returns to jail. Modern sites will also serve as a catalyst for posit", "strategies": ["• Center safety and well-being for those in custody and for staff by providing space for quality education, health, and therapeutic programming", "Support smoother transitions back into the community", "Collaborate des, union representation). An example includes incorporating demographic questions on all registration forms (i.e., flu clinics, financial planning seminars, ", "Identify potential challenges with collecting data and ensure it doesn’t lead to any barriers to participation", "Implement a clear and resourced procedure and structure for regularly tracking and analyzing participation in OLR programs", "Compare and track how statistics for OLR programs align with NYC Government Workforce Profile Report statistics on race and gender"], "indicators": ["• Number of programs where data is and is not collected", "Number of users in each demographic group/program"]}, {"goal": "Review OLR’s current hiring and promotional process to ensure equity at all stages including job posting, interviews, and hiring to reduce potential workforce disparities", "outcome": "By the end of 2026, establish a clear and consistent procedure for the hiring and promotion of OLR staff across 100% of agency divisions.", "strategies": ["• Identify titles to target for initial changes", "Review language of job postings and locations of postings for noncompetitive jobs", "Send all job postings to all CUNY schools and HBCUs, and develop relationships with career counselors", "Reach out to a broader array of professional associations to help with job postings to diversify the pool of applicants", "Develop structured interview guidelines and protocols for interview committee such as diversity of the interview team", "Train hiring managers in new protocols"], "indicators": ["• Number and demographics of staff hired and/or promoted"]}], "medium": [{"goal": "Leverage OLR spending power to advance equity in the work of our partners and strengthen a commitment to racial equity in their services. OLR will continue to implement and evaluate goals going forward to ensure they are consistent with federal, state and local law.", "outcome": "By 2028, collaborate with 100% of vendors to assess their equity programs and policies.", "strategies": ["• Identify existing use of subcontractors by vendor to establish baseline", "Review agency partnerships and request reports from different entities", "Engage in discussions regarding priorities based on historical services disparities and how that benefits the City’s workforce, and consider demonstrated commitment in contract renewal decisions", "OLR’s Legal Division will continue to partner with the Office of Collective Bargaining (OCB) and DC 37 regarding arbitrator panel composition to ensure representation"], "indicators": ["• Number of vendors with demonstrated commitment to racial equity"]}, {"goal": "Ensure all NYC employees maximize their benefits and obtain the full value of their employment by increasing participation in OLR programs through targeted and tailored outreach and program design", "outcome": "By 2028, expand the number of historically underrepresented participants based on agency analysis enrolled across 100% of City funded benefit programs administered by OLR.", "strategies": ["• Create targeted or new campaigns/programs to target underrepresented communities of color", "Build off new targeted campaigns for Health Programs (ex. Smoking Cessation, Diabetes Prevention, Cancer Screening), Deferred Comp, EAP, WorkWell NYC, Review website, videos, etc.", "Work with communications expert to assess OLR collateral, forms and website and make adjustments as required", "Simplify enrollment, educational, and communication materials so that City employees, particularly those of underrepresented backgrounds, have less barriers to access our programs"], "indicators": ["• Number of programs identified to address any barriers", "Number and demographics of staff enrolled in programs", "Number of changes implemented to make enrollment easier"]}, {"goal": "Collaborate with the Pay Equity Cabinet to determine whether there are issues of pay inequity and occupational segregation in our city workforce and identify recommendations to address changes/solutions", "outcome": "By 2027, publish a report identifying any disparities in analyzed titles.", "strategies": ["• Participate in subcommittee working to identify a vendor that will conduct review of pay equity", "Work with DCAS and external party to craft the study and to develop recommendations", "Work with DCAS, Pay Equity Cabinet, Law Department, OMB and Mayor’s Office to develop recommendations for implementation"], "indicators": ["• Number of recommendations developed and delivered"]}], "long": [{"goal": "Invest and commit a percentage of the OLR budget to advance racial equity as it pertains to staffing, contracting, and programming", "outcome": "By 2034, expand participation of underrepresented groups across OLR contracting, programming, and staffing", "strategies": ["• Continuously review representation in all OLR programs and vendor staff/subcontractors ensuring equitable participation across all categories", "Dedicate staff resources towards maintaining the diversity data for both internal and external usage", "Work with our vendors to ensure they have diverse workforces, contractors, and programs for a diverse audience"], "indicators": ["• Demographics of participants Draft Community Equity Priorities Referenced", "#1: Close the racial, gender identity, age, and disability gaps in city government positions that create or decide over city policy with individuals who are committed to equity, and social justice."]}], "eq_abbrevs": [], "eq_live": [], "eq_hold": [], "eq_retired": [], "eq_no_status": []}];

const AREA_COLORS = {
  "Children, Youth, Older Adults & Families":"#e05c3a",
  "Economy":"#2ab8a0",
  "Housing & Preservation":"#4e9eff",
  "Infrastructure & Environment":"#f0b429",
  "Health & Wellbeing":"#9b6dff",
  "Community Safety, Rights & Accountability":"#e05c8a",
  "Good Governance & Inclusive Decision-Making":"#5abf5a"
};
const AREAS = Object.keys(AREA_COLORS);

let currentArea = 'all';
let currentAgencyIdx = -1;
let searchTerm = '';

function eqStatus(a) {
  if (!a.eq_abbrevs || !a.eq_abbrevs.length) return 'none';
  if (a.eq_live && a.eq_live.length) return 'live';
  if ((a.eq_hold && a.eq_hold.length) || (a.eq_no_status && a.eq_no_status.length)) return 'partial';
  return 'none';
}

function buildAreaTabs() {
  const c = document.getElementById('area-tabs');
  let h = `<button class="area-tab active" onclick="setArea('all',this)"><span>All Areas</span><span style="font-size:10px;font-weight:700;color:var(--rust)">${AGENCIES.length}</span></button>`;
  AREAS.forEach(area => {
    const col = AREA_COLORS[area];
    const cnt = AGENCIES.filter(a=>a.area===area).length;
    h += `<button class="area-tab" onclick="setArea(${JSON.stringify(area)},this)" style="border-left:2px solid ${col}22;">
      <span>${area}</span><span style="color:${col};font-size:10px;font-weight:700;">${cnt}</span>
    </button>`;
  });
  c.innerHTML = h;
}

function setArea(area, el) {
  currentArea = area;
  document.querySelectorAll('.area-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  buildAgencyList();
}

function getFiltered() {
  return AGENCIES.filter(a => {
    const aMatch = currentArea==='all' || a.area===currentArea;
    const sMatch = !searchTerm || a.name.toLowerCase().includes(searchTerm.toLowerCase());
    return aMatch && sMatch;
  });
}

function buildAgencyList() {
  const list = document.getElementById('agency-list');
  const filtered = getFiltered();
  let h = '';
  filtered.forEach(a => {
    const idx = AGENCIES.indexOf(a);
    const col = AREA_COLORS[a.area]||'#888';
    const isActive = idx===currentAgencyIdx;
    const status = eqStatus(a);
    const liveCount = a.eq_live ? a.eq_live.length : 0;
    const bc = status==='live'?'eq-has':status==='partial'?'eq-partial':'eq-none';
    const bt = status==='live'?`${liveCount} live`:status==='partial'?'hold':'no EQ';
    h += `<button class="agency-btn${isActive?' active':''}" onclick="showAgency(${idx})">
      <span class="agency-dot" style="background:${col}"></span>
      <span class="agency-btn-name">${esc(a.name)}</span>
      <span class="agency-eq-badge ${bc}">${bt}</span>
    </button>`;
  });
  if (!h) h = '<div style="padding:12px;font-size:11px;color:var(--dim);text-align:center;">No results</div>';
  list.innerHTML = h;
}

function filterAgencies(v) { searchTerm=v; buildAgencyList(); }

function navAgency(dir) {
  const f = getFiltered();
  if (!f.length) return;
  const pos = f.findIndex(a=>AGENCIES.indexOf(a)===currentAgencyIdx);
  const next = pos===-1?(dir>0?0:f.length-1):(pos+dir+f.length)%f.length;
  showAgency(AGENCIES.indexOf(f[next]));
}

function showAgency(idx) {
  currentAgencyIdx = idx;
  const a = AGENCIES[idx];
  const col = AREA_COLORS[a.area]||'#888';
  document.getElementById('agency-title').textContent = a.name;
  const badge = document.getElementById('agency-area-badge');
  badge.textContent = a.area;
  badge.style.cssText = `background:${col}20;color:${col};font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:0.05em;text-transform:uppercase;`;
  const f = getFiltered();
  const pos = f.findIndex(x=>AGENCIES.indexOf(x)===idx);
  document.getElementById('agency-counter').textContent = `${pos+1} / ${f.length}`;
  buildAgencyList();
  renderAgency(a);
}

function renderAgency(a) {
  const content = document.getElementById('content');
  const liveInds = a.eq_live||[];
  const holdInds = a.eq_hold||[];
  const noStatusInds = a.eq_no_status||[];
  const hasEq = a.eq_abbrevs && a.eq_abbrevs.length;
  const hasLive = liveInds.length > 0;
  let html = '';

  // EQ banner
  if (!hasEq) {
    html += `<div class="eq-banner no-eq"><div class="eq-banner-icon">○</div>
      <div><div class="eq-banner-title">Not currently on EquityNYC</div>
      <div style="font-size:12px;color:var(--muted);font-weight:300;">This agency does not currently have indicators in the EquityNYC database.</div></div></div>`;
  } else if (hasLive) {
    html += `<div class="eq-banner has-live"><div class="eq-banner-icon">●</div>
      <div style="flex:1"><div class="eq-banner-title">${liveInds.length} indicator${liveInds.length!==1?'s':''} live on EquityNYC</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:300;">
        Code${a.eq_abbrevs.length>1?'s':''}: <strong style="color:var(--text)">${a.eq_abbrevs.join(', ')}</strong>
        ${holdInds.length?` · <span style="color:#f59e0b">${holdInds.length} on hold</span>`:''}
      </div>
      <div class="eq-indicator-chips">
        ${liveInds.map(i=>`<a class="eq-chip live" href="${esc(i.link)}" target="_blank">
          <span class="eq-chip-dot"></span>${esc(i.name)}<span class="eq-chip-type">${esc(i.type)}</span></a>`).join('')}
        ${holdInds.map(i=>`<span class="eq-chip hold"><span class="eq-chip-dot"></span>${esc(i.name)}<span class="eq-chip-type">hold</span></span>`).join('')}
        ${noStatusInds.map(i=>`<span class="eq-chip no-status"><span class="eq-chip-dot"></span>${esc(i.name)}</span>`).join('')}
      </div></div></div>`;
  } else {
    html += `<div class="eq-banner has-hold"><div class="eq-banner-icon">◐</div>
      <div><div class="eq-banner-title">Agency in EquityNYC — no indicators currently live</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:300;">Code${a.eq_abbrevs.length>1?'s':''}: <strong style="color:var(--text)">${a.eq_abbrevs.join(', ')}</strong></div>
      <div class="eq-indicator-chips">
        ${holdInds.map(i=>`<span class="eq-chip hold"><span class="eq-chip-dot"></span>${esc(i.name)}<span class="eq-chip-type">hold</span></span>`).join('')}
        ${noStatusInds.map(i=>`<span class="eq-chip no-status"><span class="eq-chip-dot"></span>${esc(i.name)}</span>`).join('')}
      </div></div></div>`;
  }

  // Legend
  const ns=a.short.length,nm=a.medium.length,nl=a.long.length;
  html += `<div style="display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;">`;
  if(ns) html+=`<span style="font-size:11px;color:var(--short-c);display:flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--short-c);display:inline-block;"></span>Short-term: ${ns}</span>`;
  if(nm) html+=`<span style="font-size:11px;color:var(--medium-c);display:flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--medium-c);display:inline-block;"></span>Medium-term: ${nm}</span>`;
  if(nl) html+=`<span style="font-size:11px;color:var(--long-c);display:flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--long-c);display:inline-block;"></span>Long-term: ${nl}</span>`;
  html += `</div>`;

  function renderGoals(goals, tc, tl, tr) {
    if (!goals.length) return '';
    let s=`<div class="term-section"><div class="term-header">
      <span class="term-pill ${tc}">${tl}</span>
      <span class="term-label">${tr}</span>
      <span class="term-count">${goals.length} goal${goals.length!==1?'s':''}</span>
    </div><div class="goals-grid">`;
    goals.forEach((g,i)=>{
      const id=`card-${tc}-${i}`;
      s+=`<div class="goal-card" id="${id}">
        <div class="goal-card-header" onclick="toggleCard('${id}')">
          <span class="goal-num ${tc}">${i+1}</span>
          <span class="goal-title">${esc(g.goal)}</span>
          <span class="goal-chevron">▼</span>
        </div>
        <div class="goal-body">`;
      if(g.outcome){s+=`<div class="goal-section-label">Outcome</div><div class="outcome-text">${esc(g.outcome)}</div>`;}
      if(g.strategies&&g.strategies.length){
        s+=`<div class="goal-section-label">Strategies</div><div class="strat-list">`;
        g.strategies.forEach(st=>{s+=`<div class="strat-item"><span>${esc(st)}</span></div>`;});
        s+=`</div>`;
      }
      if(g.indicators&&g.indicators.length){
        s+=`<div class="goal-section-label">Indicators</div><div class="ind-list">`;
        g.indicators.forEach(ind=>{s+=`<div class="ind-item"><span>${esc(ind)}</span></div>`;});
        s+=`</div>`;
      }
      s+=`</div></div>`;
    });
    s+=`</div></div>`;
    return s;
  }

  html += renderGoals(a.short,'short','Short-Term','1–3 years');
  html += renderGoals(a.medium,'medium','Medium-Term','4–5 years');
  html += renderGoals(a.long,'long','Long-Term','6–10 years');
  if(!ns&&!nm&&!nl) html+=`<div style="text-align:center;padding:40px;color:var(--dim);font-size:13px;">No structured goals extracted for this agency.</div>`;

  content.innerHTML = html;
  content.scrollTop = 0;
}

// ── OVERVIEW ──────────────────────────────────────────────────────
let activePopover = null;

function closePopover() {
  if (activePopover) { activePopover.remove(); activePopover=null; }
  document.getElementById('overlay').classList.remove('active');
}

function showPopover(el, title, items, colorFn) {
  closePopover();
  const rect = el.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'stat-popover';
  let h = `<div class="stat-popover-title">${title}</div>`;
  items.forEach(item => {
    const col = colorFn ? colorFn(item) : '#888';
    h += `<div class="stat-popover-item" onclick="closePopover();showAgency(${AGENCIES.indexOf(item)})">
      <span class="stat-popover-dot" style="background:${col}"></span>
      <span>${esc(item.name)}</span>
    </div>`;
  });
  pop.innerHTML = h;
  document.body.appendChild(pop);
  activePopover = pop;

  // Position below the element
  let top = rect.bottom + 8;
  let left = rect.left;
  if (left + 320 > window.innerWidth) left = window.innerWidth - 328;
  if (top + 400 > window.innerHeight) top = rect.top - 408;
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  document.getElementById('overlay').classList.add('active');
}

function showOverview() {
  currentAgencyIdx = -1;
  document.getElementById('agency-title').textContent = 'Overview';
  const badge = document.getElementById('agency-area-badge');
  badge.textContent = ''; badge.style.cssText = '';
  document.getElementById('agency-counter').textContent = `${AGENCIES.length} agencies`;
  buildAgencyList();

  const totalGoals = AGENCIES.reduce((s,a)=>s+a.short.length+a.medium.length+a.long.length,0);
  const liveAgencies = AGENCIES.filter(a=>eqStatus(a)==='live');
  const partialAgencies = AGENCIES.filter(a=>eqStatus(a)==='partial');
  const noneAgencies = AGENCIES.filter(a=>eqStatus(a)==='none');
  const totalLiveInds = AGENCIES.reduce((s,a)=>s+(a.eq_live||[]).length,0);

  let html = `<div class="ov-title">NYC Preliminary Racial Equity Plan 2026</div>
    <div class="ov-sub">Goals, strategies, and indicators across 45 city agencies — sourced from the <a href="https://www.nyc.gov/assets/equity/downloads/pdf/FINAL_PUBLISH_Preliminary%20REP_4%206%2026.pdf" target="_blank" style="color:var(--rust);text-decoration:underline;text-underline-offset:2px;">Preliminary Citywide Racial Equity Plan</a> (released April 6, 2026). Coverage indicators are drawn from <a href="https://equity.nyc.gov" target="_blank" style="color:var(--teal);text-decoration:underline;text-underline-offset:2px;">EquityNYC</a>, the City's public data tool for tracking racial and social equity. Green agencies already have live indicators on EquityNYC.</div>
    <div class="ov-stats">
      <div class="stat-box" onclick="openStatAll(this)" title="Click to see all agencies">
        <div class="stat-num" style="color:var(--rust)">45</div>
        <div class="stat-label">City agencies in REP</div>
      </div>
      <div class="stat-box" onclick="openStatAll(this)" title="Click to see all agencies">
        <div class="stat-num" style="color:var(--teal)">${totalGoals}</div>
        <div class="stat-label">Total goals</div>
      </div>
      <div class="stat-box clickable" onclick="openStatLive(this)">
        <div class="stat-num" style="color:#34d399">${totalLiveInds}</div>
        <div class="stat-label">Live EQ indicators mapped</div>
      </div>
      <div class="stat-box clickable" onclick="openStatNone(this)">
        <div class="stat-num" style="color:#6b7280">${noneAgencies.length}</div>
        <div class="stat-label">Agencies not on EquityNYC</div>
      </div>
    </div>

    <div class="eq-coverage-card">
      <div class="eq-cs-title">EquityNYC Coverage by Agency</div>
      <div class="eq-cs-grid">
        <div class="eq-cs-item" onclick="openStatLiveAgencies(this)">
          <div class="eq-cs-dot" style="background:#34d399"></div>
          <div><div class="eq-cs-count" style="color:#34d399">${liveAgencies.length}</div><div class="eq-cs-label">agencies with live indicators</div></div>
        </div>
        <div class="eq-cs-item" onclick="openStatPartial(this)">
          <div class="eq-cs-dot" style="background:#f59e0b"></div>
          <div><div class="eq-cs-count" style="color:#f59e0b">${partialAgencies.length}</div><div class="eq-cs-label">agencies with indicators on hold</div></div>
        </div>
        <div class="eq-cs-item" onclick="openStatNone(this)">
          <div class="eq-cs-dot" style="background:#6b7280"></div>
          <div><div class="eq-cs-count" style="color:#6b7280">${noneAgencies.length}</div><div class="eq-cs-label">agencies not on EquityNYC</div></div>
        </div>
      </div>
    </div>

    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Browse by area — click to filter</div>
    <div class="area-cards">`;

  AREAS.forEach(area => {
    const aA = AGENCIES.filter(a=>a.area===area);
    const aG = aA.reduce((s,a)=>s+a.short.length+a.medium.length+a.long.length,0);
    const aL = aA.filter(a=>eqStatus(a)==='live').length;
    const col = AREA_COLORS[area];
    const pct = Math.round(aL/aA.length*100);
    html += `<div class="area-overview-card" onclick="filterByArea(${JSON.stringify(area)})">
      <div class="area-dot-big" style="background:${col}"></div>
      <div style="flex:1">
        <div class="area-card-name">${area}</div>
        <div class="area-card-meta">${aA.length} agencies · ${aG} goals</div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:5px;">
          <div style="flex:1;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:#34d399;border-radius:2px;"></div>
          </div>
          <span style="font-size:9.5px;color:#34d399;font-weight:600;">${aL}/${aA.length} on EQ</span>
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('content').innerHTML = html;
}

// Stat box click handlers
function openStatAll(el) {
  showPopover(el, 'All 45 Agencies', AGENCIES, a => AREA_COLORS[a.area]||'#888');
}
function openStatLive(el) {
  const items = AGENCIES.filter(a=>a.eq_live&&a.eq_live.length);
  showPopover(el, `${items.length} Agencies with Live EQ Indicators`, items, a=>AREA_COLORS[a.area]||'#888');
}
function openStatLiveAgencies(el) { openStatLive(el); }
function openStatPartial(el) {
  const items = AGENCIES.filter(a=>eqStatus(a)==='partial');
  showPopover(el, `${items.length} Agencies — Indicators On Hold`, items, a=>AREA_COLORS[a.area]||'#888');
}
function openStatNone(el) {
  const items = AGENCIES.filter(a=>eqStatus(a)==='none');
  showPopover(el, `${items.length} Agencies Not on EquityNYC`, items, ()=>'#6b7280');
}

function filterByArea(area) {
  currentArea = area;
  document.querySelectorAll('.area-tab').forEach(t => {
    t.classList.remove('active');
    if (t.textContent.trim().startsWith(area.substring(0,15))) t.classList.add('active');
  });
  buildAgencyList();
  const first = AGENCIES.find(a=>a.area===area);
  if (first) showAgency(AGENCIES.indexOf(first));
}

function toggleCard(id) { document.getElementById(id).classList.toggle('open'); }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') navAgency(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') navAgency(-1);
  if (e.key==='Escape') { closePopover(); if(currentAgencyIdx!==-1) showOverview(); }
});

buildAreaTabs();
buildAgencyList();
showOverview();
</script>
</body>
</html>
